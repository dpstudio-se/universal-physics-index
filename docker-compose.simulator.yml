version: '3.8'
services:
  angelica:
    build: .
    ports:
      - "8080:8080"
    environment:
      - NODE_ENV=simulation
    volumes:
      - .:/app

  puter-mock:
    image: python:3.11-alpine
    command: python -m http.server 4000
    ports:
      - "4000:4000"

  oden-mock:
    image: python:3.11-alpine
    command: python -m http.server 8081
    ports:
      - "8081:8081"

  odens-eye-mock:
    image: python:3.11-alpine
    command: python -m http.server 8082
    ports:
      - "8082:8082"
