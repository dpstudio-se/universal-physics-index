services:
  angelica:
    image: universal-physics-index-simulator
    build:
      context: .
      dockerfile: Dockerfile.simulator
    ports:
      - "8080:8080"
    environment:
      - SIMULATOR_MODE=true
    read_only: true
    tmpfs:
      - /tmp
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - "import urllib.request; urllib.request.urlopen('http://localhost:8080/health')"
      interval: 5s
      timeout: 3s
      retries: 12

  puter-mock:
    image: universal-physics-index-simulator
    command: ["python", "mock_server.py", "4000"]
    ports:
      - "4000:4000"
    read_only: true
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true

  oden-mock:
    image: universal-physics-index-simulator
    command: ["python", "mock_server.py", "8081"]
    ports:
      - "8081:8081"
    read_only: true
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true

  odens-eye-mock:
    image: universal-physics-index-simulator
    command: ["python", "mock_server.py", "8082"]
    ports:
      - "8082:8082"
    read_only: true
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
