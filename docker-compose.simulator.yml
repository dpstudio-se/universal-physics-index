              self.send_response(200); self.send_header('Content-type', 'text/plain'); self.end_headers(); self.wfile.write(b'Mock Oden Response OK')
          def do_POST(self):
              self.send_response(201); self.send_header('Content-type', 'text/plain'); self.end_headers(); self.wfile.write(b'Mock Oden POST OK')
      HTTPServer(('0.0.0.0', 8081), MockHandler).serve_forever()"
    ports:
      - "8081:8081"
    read_only: true
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true

