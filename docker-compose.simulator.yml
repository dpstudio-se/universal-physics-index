services:
  angelica:
    build:
      context: .
      dockerfile: Dockerfile.simulator
    ports:
      - "8080:8080"
    environment:
      - SIMULATOR_MODE=true
    read_only: true
    tmpfs:
      - /tmp
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - "import urllib.request; urllib.request.urlopen('http://localhost:8080/health')"
      interval: 5s
      timeout: 3s
      retries: 12

  puter-mock:
    image: python:3.9-slim
    command: >
      python3 -c "
      from http.server import BaseHTTPRequestHandler, HTTPServer;
      class MockHandler(BaseHTTPRequestHandler):
          def do_GET(self):
              self.send_response(200); self.send_header('Content-type', 'text/plain'); self.end_headers(); self.wfile.write(b'Mock Puter Response OK')
          def do_POST(self):
              self.send_response(201); self.send_header('Content-type', 'text/plain'); self.end_headers(); self.wfile.write(b'Mock Puter POST OK')
      HTTPServer(('0.0.0.0', 4000), MockHandler).serve_forever()"
    ports:
      - "4000:4000"
    read_only: true
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true

  oden-mock:
    image: python:3.9-slim
    command: >
      python3 -c "
      from http.server import BaseHTTPRequestHandler, HTTPServer;
