version: '3.8'
services:
  angelica:
    build: .
    ports:
      - "8080:8080"
    environment:
      - NODE_ENV=simulation
    volumes:
      - .:/app

  puter-mock:
    image: alpine
    command: nc -lk -p 4000 -e echo "HTTP/1.1 200 OK\n\nMock Puter Response"
    ports:
      - "4000:4000"

  oden-mock:
    image: alpine
    command: nc -lk -p 8081 -e echo "HTTP/1.1 200 OK\n\nMock Oden Response"
    ports:
      - "8081:8081"

  odens-eye-mock:
    image: alpine
    command: nc -lk -p 8082 -e echo "HTTP/1.1 200 OK\n\nMock Eye Response"
    ports:
      - "8082:8082"
