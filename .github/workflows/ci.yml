name: CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    name: Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: ${{ matrix.python-version }}
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip setuptools wheel
          python -m pip install -e ".[dev]"
      
      - name: Lint with ruff
        run: ruff check src tests angelica_loader.py angelica_simulator.py mock_server.py repo_audit.py
      
      - name: Type check with mypy
        run: mypy src/upi angelica_loader.py angelica_simulator.py mock_server.py repo_audit.py --ignore-missing-imports
      
      - name: Run tests with pytest
        run: python -m pytest tests/ -v --tb=short
      
      - name: Validate JSON schemas
        run: |
          python -c "
          import json
          from pathlib import Path
          from jsonschema import Draft7Validator
          
          schemas_dir = Path('schemas')
          for schema_file in schemas_dir.glob('*.json'):
              with open(schema_file) as f:
                  schema = json.load(f)
              Draft7Validator.check_schema(schema)
              print(f'✓ {schema_file.name} is valid')
          "
      
      - name: Validate example JSON files
        run: |
          python -c "
          import json
          from pathlib import Path
          from jsonschema import validate

          schemas = {
              name: json.loads(Path(f'schemas/{name}.schema.json').read_text())
              for name in ('node', 'bridge', 'theory')
          }

          for example in Path('data').rglob('*.json'):
              data = json.loads(example.read_text())
              if {'source', 'target', 'relation'} <= data.keys():
                  record_type = 'bridge'
              elif {'domain', 'scope'} <= data.keys():
                  record_type = 'theory'
              else:
                  record_type = 'node'
              validate(instance=data, schema=schemas[record_type])
              print(f'✓ {example.relative_to(\"data\")} is valid as {record_type}')
          "

      - name: Validate VR-ASI platform manifests
        run: python repo_audit.py --output repo-audit.json
      
      - name: Build package
        run: |
          python -m pip install --upgrade pip setuptools wheel
          python -m pip wheel . --no-deps --wheel-dir dist
          python -c "import glob, zipfile; names = zipfile.ZipFile(glob.glob('dist/*.whl')[0]).namelist(); assert all(any(name.endswith('/schemas/' + schema) for name in names) for schema in ('node.schema.json', 'bridge.schema.json', 'theory.schema.json'))"

  simulator:
    name: Simulator Smoke Test
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Validate Docker Compose configuration
        run: docker compose -f docker-compose.simulator.yml config --quiet

      - name: Run simulator smoke tests
        run: bash run_sim_tests.sh

  security:
    name: Security Checks
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      
      - name: Run trivy on source
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          scan-type: 'fs'
          scan-ref: 'src'
          format: 'sarif'
          output: 'trivy-results.sarif'
      
      - name: Upload Trivy results
        uses: github/codeql-action/upload-sarif@7188fc363630916deb702c7fdcf4e481b751f97a # v4
        if: always()
        with:
          sarif_file: 'trivy-results.sarif'
