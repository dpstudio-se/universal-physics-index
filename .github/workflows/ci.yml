name: CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

env:
  PIP_DISABLE_PIP_VERSION_CHECK: "1"

jobs:
  test:
    name: Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --quiet --upgrade pip setuptools wheel
          python -m pip install --quiet -e ".[dev]"
          python -m pip install --quiet -e ./modules/vrasi-physics
          python -m pip install --quiet -e ./modules/vrasi-swarm
          python -m pip install --quiet -e ./modules/vrasi-qudit

      - name: Lint with ruff
        id: ruff
        continue-on-error: true
        run: ruff check src tests repo_audit.py modules/vrasi-physics/src modules/vrasi-physics/tests modules/vrasi-swarm/src modules/vrasi-swarm/tests modules/vrasi-qudit/src modules/vrasi-qudit/tests --output-format json > ruff-report.json

      - name: Upload Ruff diagnostics
        if: steps.ruff.outcome == 'failure'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ruff-report-${{ matrix.python-version }}
          path: ruff-report.json

      - name: Fail on Ruff findings
        if: steps.ruff.outcome == 'failure'
        run: |
          cat ruff-report.json
          exit 1

      - name: Type check with mypy
        run: |
          mypy src/upi repo_audit.py --ignore-missing-imports
          mypy modules/vrasi-physics/src/vrasi_physics
          mypy modules/vrasi-swarm/src/vrasi_swarm
          mypy modules/vrasi-qudit/src/vrasi_qudit

      - name: Run tests with pytest
        id: pytest
        continue-on-error: true
        run: python -m pytest tests/ modules/vrasi-physics/tests/ modules/vrasi-swarm/tests/ modules/vrasi-qudit/tests/ -v --tb=short --junitxml=pytest-report.xml

      - name: Upload pytest diagnostics
        if: steps.pytest.outcome == 'failure'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: pytest-report-${{ matrix.python-version }}
          path: pytest-report.xml

      - name: Fail on pytest failures
        if: steps.pytest.outcome == 'failure'
        run: exit 1

      - name: Validate JSON schemas
        run: |
          python -c "
          import json
          from pathlib import Path
          from jsonschema import Draft7Validator

          schemas_dir = Path('schemas')
          for schema_file in schemas_dir.glob('*.json'):
              schema = json.loads(schema_file.read_text(encoding='utf-8'))
              Draft7Validator.check_schema(schema)
              print(f'✓ {schema_file.name} is valid')
          "

      - name: Validate typed data records
        run: |
          python -c "
          import json
          from pathlib import Path
          from jsonschema import validate

          schemas = {
              name: json.loads(Path(f'schemas/{name}.schema.json').read_text(encoding='utf-8'))
              for name in ('node', 'bridge', 'theory')
          }

          data_root = Path('data')
          for example in data_root.rglob('*.json'):
              if example.name.startswith('invalid_'):
                  print(f'✓ {example.relative_to(data_root)} is an intentional negative fixture')
                  continue
              data = json.loads(example.read_text(encoding='utf-8'))
              if {'source', 'target', 'relation'} <= data.keys():
                  record_type = 'bridge'
              elif {'address', 'title', 'description', 'status', 'domain', 'scope'} <= data.keys():
                  record_type = 'theory'
              elif {'address', 'title', 'status'} <= data.keys():
                  record_type = 'node'
              else:
                  raise ValueError(f'Unclassified data record: {example}')
              validate(instance=data, schema=schemas[record_type])
              print(f'✓ {example.relative_to(data_root)} is valid as {record_type}')
          "

      - name: Run repository integrity audit
        run: python repo_audit.py --output repo-audit.json

      - name: Build package
        run: |
          python -m pip wheel --quiet . --no-deps --wheel-dir dist
          python -m pip wheel --quiet ./modules/vrasi-physics --no-deps --wheel-dir dist/vrasi-physics
          python -m pip wheel --quiet ./modules/vrasi-swarm --no-deps --wheel-dir dist/vrasi-swarm
          python -m pip wheel --quiet ./modules/vrasi-qudit --no-deps --wheel-dir dist/vrasi-qudit
          python -c "import glob, zipfile; names = zipfile.ZipFile(glob.glob('dist/*.whl')[0]).namelist(); assert all(any(name.endswith('/schemas/' + schema) for name in names) for schema in ('node.schema.json', 'bridge.schema.json', 'theory.schema.json', 'agent-task.schema.json', 'agent-result.schema.json', 'workflow.schema.json'))"

  github-source-install:
    name: GitHub URL integration
    runs-on: ubuntu-latest
    env:
      SOURCE_SHA: ${{ github.event.pull_request.head.sha || github.sha }}
      REPOSITORY_URL: https://github.com/dpstudio-se/universal-physics-index.git
    steps:
      - name: Set up Python 3.13
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.13"

      - name: Install all packages from the exact GitHub commit
        run: |
          python -m pip install --quiet --upgrade pip setuptools wheel
          SOURCE_URL="git+${REPOSITORY_URL}@${SOURCE_SHA}"
          python -m pip install --quiet --no-cache-dir "${SOURCE_URL}"
          python -m pip install --quiet --no-cache-dir "${SOURCE_URL}#subdirectory=modules/vrasi-physics"
          python -m pip install --quiet --no-cache-dir "${SOURCE_URL}#subdirectory=modules/vrasi-swarm"
          python -m pip install --quiet --no-cache-dir "${SOURCE_URL}#subdirectory=modules/vrasi-qudit"

      - name: Verify GitHub source provenance
        run: |
          python - <<'PY'
          import json
          import os
          from importlib import metadata

          expected_url = os.environ["REPOSITORY_URL"]
          expected_sha = os.environ["SOURCE_SHA"]
          for distribution_name in (
              "universal-physics-index",
              "vrasi-physics",
              "vrasi-swarm",
              "vrasi-qudit",
          ):
              distribution = metadata.distribution(distribution_name)
              direct_url_text = distribution.read_text("direct_url.json")
              assert direct_url_text is not None, distribution_name
              direct_url = json.loads(direct_url_text)
              assert direct_url["url"] == expected_url, direct_url
              assert direct_url["vcs_info"]["vcs"] == "git", direct_url
              assert direct_url["vcs_info"]["commit_id"] == expected_sha, direct_url
              print(f"✓ {distribution_name} installed from {expected_url}@{expected_sha}")
          PY

      - name: Smoke test every public module API
        run: |
          python - <<'PY'
          import upi
          import vrasi_physics
          import vrasi_qudit
          import vrasi_swarm

          assert upi.index8_from_frequency(8.0) == 1.0
          assert upi.mass_from_frequency(8.0) > 0.0
          upi_search = upi.search_torus_register((4, 5), (7,))
          assert upi_search.ranked_states[0].index == 7
          assert upi_search.success_probability > 0.99

          physics_result = vrasi_physics.evaluate_frequency(8.0)
          assert physics_result.reference_index == 1.0
          assert physics_result.energy_j > 0.0
          assert physics_result.mass_equivalent_kg > 0.0

          qudit_result = vrasi_qudit.search_torus_register((4, 5), (7,))
          assert qudit_result.ranked_states[0].coordinates == (1, 2)
          assert qudit_result.dual_round_trip_error < 1e-12
          assert len(qudit_result.stages) > 3

          assert vrasi_swarm.POOL_SIZE == 9
          assert vrasi_swarm.SELECTED_SIZE == 3
          assert vrasi_swarm.QUORUM_SIZE == 3
          assert len(vrasi_swarm.digest_payload({"source": "github"})) == 64
          print("✓ UPI, vrasi-physics, vrasi-qudit and vrasi-swarm APIs passed")
          PY

      - name: Smoke test every installed CLI
        run: |
          upi --version
          upi index8 --frequency 8
          vrasi-physics 8
          vrasi-qudit --dimensions 4,5 --targets 7 --top-k 3
          vrasi-swarm demo

  security:
    name: Security Checks
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Run trivy on source
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'sarif'
          output: 'trivy-results.sarif'

      - name: Upload Trivy results
        uses: github/codeql-action/upload-sarif@7188fc363630916deb702c7fdcf4e481b751f97a # v4
        if: always()
        with:
          sarif_file: 'trivy-results.sarif'
