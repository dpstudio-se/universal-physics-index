name: CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

env:
  PIP_DISABLE_PIP_VERSION_CHECK: "1"

jobs:
  test:
    name: Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --quiet --upgrade pip setuptools wheel
          python -m pip install --quiet -e ".[dev]"
          python -m pip install --quiet -e ./modules/vrasi-physics
          python -m pip install --quiet -e ./modules/vrasi-swarm

      - name: Lint with ruff
        id: ruff
        continue-on-error: true
        run: ruff check src tests repo_audit.py modules/vrasi-physics/src modules/vrasi-physics/tests modules/vrasi-swarm/src modules/vrasi-swarm/tests --output-format json > ruff-report.json

      - name: Upload Ruff diagnostics
        if: steps.ruff.outcome == 'failure'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ruff-report-${{ matrix.python-version }}
          path: ruff-report.json

      - name: Fail on Ruff findings
        if: steps.ruff.outcome == 'failure'
        run: |
          cat ruff-report.json
          exit 1

      - name: Type check with mypy
        run: |
          mypy src/upi repo_audit.py --ignore-missing-imports
          mypy modules/vrasi-physics/src/vrasi_physics
          mypy modules/vrasi-swarm/src/vrasi_swarm

      - name: Run tests with pytest
        run: python -m pytest tests/ modules/vrasi-physics/tests/ modules/vrasi-swarm/tests/ -v --tb=short

      - name: Validate JSON schemas
        run: |
          python -c "
          import json
          from pathlib import Path
          from jsonschema import Draft7Validator

          schemas_dir = Path('schemas')
          for schema_file in schemas_dir.glob('*.json'):
              schema = json.loads(schema_file.read_text(encoding='utf-8'))
              Draft7Validator.check_schema(schema)
              print(f'✓ {schema_file.name} is valid')
          "

      - name: Validate typed data records
        run: |
          python -c "
          import json
          from pathlib import Path
          from jsonschema import validate

          schemas = {
              name: json.loads(Path(f'schemas/{name}.schema.json').read_text(encoding='utf-8'))
              for name in ('node', 'bridge', 'theory')
          }

          data_root = Path('data')
          for example in data_root.rglob('*.json'):
              if example.name.startswith('invalid_'):
                  print(f'✓ {example.relative_to(data_root)} is an intentional negative fixture')
                  continue
              data = json.loads(example.read_text(encoding='utf-8'))
              if {'source', 'target', 'relation'} <= data.keys():
                  record_type = 'bridge'
              elif {'address', 'title', 'description', 'status', 'domain', 'scope'} <= data.keys():
                  record_type = 'theory'
              elif {'address', 'title', 'status'} <= data.keys():
                  record_type = 'node'
              else:
                  raise ValueError(f'Unclassified data record: {example}')
              validate(instance=data, schema=schemas[record_type])
              print(f'✓ {example.relative_to(data_root)} is valid as {record_type}')
          "

      - name: Run repository integrity audit
        run: python repo_audit.py --output repo-audit.json

      - name: Build package
        run: |
          python -m pip wheel --quiet . --no-deps --wheel-dir dist
          python -m pip wheel --quiet ./modules/vrasi-physics --no-deps --wheel-dir dist/vrasi-physics
          python -m pip wheel --quiet ./modules/vrasi-swarm --no-deps --wheel-dir dist/vrasi-swarm
          python -c "import glob, zipfile; names = zipfile.ZipFile(glob.glob('dist/*.whl')[0]).namelist(); assert all(any(name.endswith('/schemas/' + schema) for name in names) for schema in ('node.schema.json', 'bridge.schema.json', 'theory.schema.json', 'agent-task.schema.json', 'agent-result.schema.json', 'workflow.schema.json'))"

  security:
    name: Security Checks
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Run trivy on source
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'sarif'
          output: 'trivy-results.sarif'

      - name: Upload Trivy results
        uses: github/codeql-action/upload-sarif@7188fc363630916deb702c7fdcf4e481b751f97a # v4
        if: always()
        with:
          sarif_file: 'trivy-results.sarif'
